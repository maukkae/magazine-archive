name: Publish GHCR Images

on:
  push:
    branches:
      - main
    paths:
      - "maukka-magazine-archive/viewer/**"
      - "maukka-magazine-archive/search/**"
      - "maukka-magazine-archive/init/**"
      - "maukka-magazine-archive/admin/**"
      - "maukka-magazine-archive/docker-compose.yml"
      - ".github/workflows/publish-ghcr-images.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: viewer
            context: ./maukka-magazine-archive/viewer
            dockerfile: ./maukka-magazine-archive/viewer/Dockerfile
            image: ghcr.io/maukkae/magazine-archive-viewer
          - name: search
            context: ./maukka-magazine-archive/search
            dockerfile: ./maukka-magazine-archive/search/Dockerfile
            image: ghcr.io/maukkae/magazine-archive-search
          - name: init
            context: ./maukka-magazine-archive
            dockerfile: ./maukka-magazine-archive/init/Dockerfile
            image: ghcr.io/maukkae/magazine-archive-init
          - name: admin
            context: ./maukka-magazine-archive
            dockerfile: ./maukka-magazine-archive/admin/Dockerfile
            image: ghcr.io/maukkae/magazine-archive-admin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
