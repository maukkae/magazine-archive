services:
  viewer:
    build:
      context: ./viewer
    restart: unless-stopped
    depends_on:
      - search
    ports:
      - "8088:80"
    volumes:
      - ${APP_DATA_DIR}/site:/usr/share/nginx/html:ro

  search:
    build:
      context: ./search
    restart: unless-stopped
    working_dir: /app
    environment:
      SEARCH_HOST: 0.0.0.0
      SEARCH_PORT: 8002
      SEARCH_DB: /data/search.db
      SEARCH_STATIC_ROOT: /data
    volumes:
      - ${APP_DATA_DIR}/site:/data:rw

  # Optional future service if you want in-app extraction/import support.
  # extractor:
  #   build:
  #     context: ./extractor
  #   restart: unless-stopped
  #   volumes:
  #     - ${APP_DATA_DIR}/site:/work
