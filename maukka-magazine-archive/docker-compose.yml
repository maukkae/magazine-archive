services:
  app_proxy:
    environment:
      APP_HOST: maukka-magazine-archive_viewer_1
      APP_PORT: 80
      PROXY_AUTH_ADD: "false"

  init:
    image: ghcr.io/maukkae/magazine-archive-init:latest
    restart: "no"
    volumes:
      - ${APP_DATA_DIR}:/data

  viewer:
    image: ghcr.io/maukkae/magazine-archive-viewer:latest
    restart: unless-stopped
    depends_on:
      - init
      - search
      - admin
    volumes:
      - ${APP_DATA_DIR}:/usr/share/nginx/html:ro

  search:
    image: ghcr.io/maukkae/magazine-archive-search:latest
    restart: unless-stopped
    depends_on:
      - init
    working_dir: /app
    environment:
      SEARCH_HOST: 0.0.0.0
      SEARCH_PORT: 8002
      SEARCH_DB: /data/site/search.db
      SEARCH_STATIC_ROOT: /data/site
    volumes:
      - ${APP_DATA_DIR}:/data:rw

  admin:
    image: ghcr.io/maukkae/magazine-archive-admin:latest
    restart: unless-stopped
    depends_on:
      - init
    environment:
      ADMIN_HOST: 0.0.0.0
      ADMIN_PORT: 8001
      ARCHIVE_JPG_DIR: /data/site/jpg
      ARCHIVE_MANIFEST_FILE: /data/site/manifest.json
      ARCHIVE_SEARCH_INDEX_FILE: /data/site/search_index.json
      ARCHIVE_SEARCH_DB_FILE: /data/site/search.db
      ARCHIVE_CAROUSEL_FILE: /data/site/carousel.html
      ARCHIVE_MOBILE_FILE: /data/site/mobile.html
      ARCHIVE_PDF_DIR: /data/pdf
      ARCHIVE_SCAN_DIR: /data/scans
    volumes:
      - ${APP_DATA_DIR}:/data:rw

  # Optional future service if you want in-app extraction/import support.
  # extractor:
  #   build:
  #     context: ./extractor
  #   restart: unless-stopped
  #   volumes:
  #     - ${APP_DATA_DIR}/site:/work
