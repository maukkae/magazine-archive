manifestVersion: 1
id: maukka-magazine-archive
name: Magazine Archive
tagline: Browse and search a self-hosted magazine collection
icon: https://raw.githubusercontent.com/maukkae/magazine-archive/main/maukka-magazine-archive/icon.png
category: media
version: "0.1.15"
port: 8098
description: >-
  Magazine Archive is a self-hosted viewer for retro and modern magazine
  collections. It supports cover browsing, spread reading, mobile access, and
  fast SQLite-backed full-text search.

  This repository is currently a packaging draft for a future Umbrel community
  app release.
