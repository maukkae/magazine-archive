releaseNotes: >-
  Fixes admin server losing page tags (ad overlays, hide-ads) after deploy.
  Fixes search database rebuild no longer wiping reviews not owned by the
  page index. Adds review search support for Hifimaailma-style review types
  (Testi, Kokeilu, Vertailu, Huippu badges).
